<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - VegBite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>
  <div class="loader">
    <div class="loader__mark"></div>
  </div>
  <header class="navbar">
    <div class="container">
      <a href="index.html" class="brand"><span class="veg-mark"></span> VegBite</a>
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="nav-cart" aria-label="View cart">
          <i class="fa-solid fa-basket-shopping"></i>
          <span class="nav-cart__badge is-hidden" data-cart-count>0</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header container">
      <span class="eyebrow"><span class="veg-mark"></span> Account</span>
      <h1 id="profile-title">Your Profile</h1>
      <p>Update your details and see your saved orders.</p>
    </div>

    <section class="section" style="padding-top:0;">
      <div class="container profile-layout">
        <form class="checkout-card" id="profile-form">
          <h2>Profile Details</h2>
          <div class="form-field">
            <label for="profile-name">Full Name</label>
            <input type="text" id="profile-name" required />
          </div>
          <div class="form-field">
            <label for="profile-email">Email</label>
            <input type="email" id="profile-email" required />
          </div>
          <div class="form-field">
            <label for="profile-phone">Phone</label>
            <input type="tel" id="profile-phone" />
          </div>
          <button class="btn btn--primary btn--block" type="submit">Save Profile</button>
          <button class="btn btn--ghost btn--block" type="button" id="logout-btn"
            style="margin-top:12px;">Logout</button>
        </form>

        <aside class="checkout-card">
          <h2>Recent Orders</h2>
          <div id="profile-orders"></div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">© 2026 VegBite. All rights reserved.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
  <script src="js/profile.js"></script>
</body>

</html>
