<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - VegBite</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%232f6b3a%22/><circle cx=%2250%22 cy=%2250%22 r=%2222%22 fill=%22%23fbf8f1%22/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/cart.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>

<body>

  <div class="loader">
    <div class="loader__mark"></div>
  </div>

  <header class="navbar">
    <div class="container">
      <a href="index.html" class="brand"><span class="veg-mark"></span> VegBite</a>
      <nav class="nav-menu">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="cart.html">Cart</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </nav>
      <div class="nav-actions">
        <a href="cart.html" class="nav-cart" aria-label="View cart">
          <i class="fa-solid fa-basket-shopping"></i>
          <span class="nav-cart__badge is-hidden" data-cart-count>0</span>
        </a>
        <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card" data-reveal>
      <a href="index.html" class="auth-card__close" aria-label="Close">
        <i class="fa-solid fa-xmark"></i>
      </a>

      <div class="auth-card__brand">
        <span class="veg-mark"></span> VegBite
      </div>

      <div class="auth-card__head">
        <h1>Login</h1>
        <p>Log in to reorder your favourite pure veg meals.</p>
      </div>

      <!-- ============== PHONE OTP PANEL (default) ============== -->
      <div class="auth-panel" id="phone-panel">
        <form id="phone-otp-form" novalidate>
          <label class="sr-only" for="login-phone">Phone number</label>
          <div class="phone-field">
            <span class="phone-field__code">🇮🇳 +91 <i class="fa-solid fa-chevron-down"></i></span>
            <input type="tel" id="login-phone" placeholder="Phone number" maxlength="10" inputmode="numeric"
              autocomplete="tel" />
          </div>
          <span class="form-field__error" id="login-phone-error"></span>

          <button type="submit" class="btn btn--primary btn--block" id="send-phone-otp">
            Send One Time Password
          </button>
        </form>

        <div class="form-field otp-field is-hidden" id="phone-otp-box">
          <label for="phone-otp-input">Enter the OTP sent to +91 <span id="phone-otp-target"></span></label>
          <input type="text" id="phone-otp-input" placeholder="• • • • • •" maxlength="6" inputmode="numeric"
            autocomplete="one-time-code" />
          <span class="form-field__error"></span>
          <div class="otp-meta">
            <span id="phone-otp-timer">Expires in 60s</span>
            <button type="button" class="otp-meta__resend is-disabled" id="phone-otp-resend" disabled>Resend
              OTP</button>
          </div>
          <button type="button" class="btn btn--primary btn--block" id="verify-phone-otp">
            Verify &amp; Continue
          </button>
        </div>

        <div class="auth-divider"><span>or</span></div>

        <div class="auth-stack">
          <button type="button" class="btn btn--secondary btn--block" id="show-email-login">
            <i class="fa-regular fa-envelope"></i> Continue with Email
          </button>
          <button type="button" class="btn btn--google btn--block" id="google-login">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
              <path fill="#FFC107"
                d="M43.6 20.5H42V20H24v8h11.3C33.7 32.6 29.3 35.5 24 35.5c-6.4 0-11.6-5.2-11.6-11.5S17.6 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.9 6.1 29.2 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.2-.1-2.4-.4-3.5z" />
              <path fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 12.5 24 12.5c2.9 0 5.6 1.1 7.6 2.9l5.7-5.7C33.9 6.1 29.2 4 24 4c-7.3 0-13.6 4.1-16.9 10.2z" />
              <path fill="#4CAF50"
                d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.3C29.2 35.4 26.7 36.3 24 36.3c-5.3 0-9.7-3.4-11.3-8.1l-6.6 5.1C9.5 39.8 16.2 44 24 44z" />
              <path fill="#1976D2"
                d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l6.2 5.3C40.4 36.2 44 30.6 44 24c0-1.2-.1-2.4-.4-3.5z" />
            </svg>
            Sign in with Google
          </button>
        </div>
      </div>

      <!-- ============== EMAIL OTP PANEL ============== -->
      <div class="auth-panel is-hidden" id="email-panel">
        <button type="button" class="auth-panel__back" id="back-to-phone">
          <i class="fa-solid fa-arrow-left"></i> Back
        </button>

        <form id="email-otp-form" novalidate>
          <div class="form-field">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
            <span class="form-field__error"></span>
          </div>

          <button type="submit" class="btn btn--primary btn--block" id="send-email-otp">
            Send 6-Digit Email OTP
          </button>
        </form>

        <div class="form-field otp-field is-hidden" id="email-otp-box">
          <label for="login-otp">Enter the OTP sent to <span id="email-otp-target"></span></label>
          <input type="text" id="login-otp" placeholder="• • • • • •" maxlength="6" inputmode="numeric"
            autocomplete="one-time-code" />
          <span class="form-field__error"></span>
          <div class="otp-meta">
            <span id="email-otp-timer">Expires in 60s</span>
            <button type="button" class="otp-meta__resend is-disabled" id="email-otp-resend" disabled>Resend
              OTP</button>
          </div>
          <button type="button" class="btn btn--primary btn--block" id="otp-verify">
            Verify &amp; Continue
          </button>
        </div>
      </div>

      <div class="auth-card__foot">
        New to VegBite? <a href="signup.html">Create account</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__bottom">© 2026 VegBite. All rights reserved. Made for pure veg food lovers.</div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
